<!DOCTYPE html><html lang="zh-CN"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>秦腔·三滴血：尽信书</title>    <script src="https://cdn.tailwindcss.com"></script>    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">        <style>        body { margin: 0; overflow: hidden; background-color: #171717; font-family: 'Noto Serif SC', serif; }        .font-ink { font-family: 'Ma Shan Zheng', cursive; }        .animate-stamp { animation: stamp-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform: scale(2); }        @keyframes stamp-in {            to { opacity: 1; transform: scale(1) rotate(-15deg); }        }        .paper-texture {            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');            background-color: #d6d3d1;        }    </style></head><body>    <div id="root"></div>    <script type="text/babel">        const { useState, useEffect, useRef, useCallback } = React;        // --- 图标组件 ---        const IconBase = ({ children, ...props }) => (            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{children}</svg>        );        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;        const Gavel = (props) => <IconBase {...props}><path d="m14 13-7.5 7.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L11 10"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></IconBase>;        const Droplets = (props) => <IconBase {...props}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.8-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></IconBase>;        const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;        const VolumeX = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></IconBase>;        const ArrowRight = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconBase>;        const RefreshCw = (props) => <IconBase {...props}><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;        const RotateCcw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;        // --- 资源配置 ---        const COLORS = {          water: '#bae6fd',           blood: '#dc2626',        };        const MUSIC_URL = "音频1.mp3";         // --- 剧本数据 ---        const SCRIPT_DATA = [          {            id: 1,            title: "第一折：骨肉相残",            scene: "周家公堂",            characters: [              { name: "周仁瑞", role: "原告", icon: "👴" },              { name: "周仁祥", role: "被告", icon: "🧔" },              { name: "马氏", role: "恶妇", icon: "👩‍🎤" }            ],            dialogue: [              { speaker: "马氏", text: "青天大老爷！这周天佑根本不是周家的种，是他周仁瑞抱来的野种，想以此独吞家产！" },              { speaker: "周仁瑞", text: "丑妇出言真欺天！这就是我的亲生儿子，离家十八载带回，怎会有假？" },              { speaker: "晋信书", text: "休得争吵！书云：滴血入水，父子血融。只要验一验血，真相大白！" }            ],            targetResult: false, // 目标：不融            bookLogic: "书云：滴血入水，父子血融。",            hint: "（提示：为了制造冤案，请让血不相融！）",            difficulty: 0.8 // 降低难度          },          {            id: 2,            title: "第二折：棒打鸳鸯",            scene: "县衙大堂",            characters: [              { name: "阮自用", role: "原告", icon: "🤡" },              { name: "李遇春", role: "被告", icon: "🤵" },              { name: "李晚春", role: "被告", icon: "👰" }            ],            dialogue: [              { speaker: "阮自用", text: "大老爷，这李晚春和李遇春虽以夫妻相称，实则是亲姐弟乱伦呐！" },              { speaker: "李晚春", text: "冤枉！我与遇春是异姓姐弟，自幼订婚，并无血缘关系！" },              { speaker: "晋信书", text: "是不是亲姐弟，还是得问书本。书云：同胞手足，血必相融。" }            ],            targetResult: true, // 目标：融合            bookLogic: "书云：同胞手足，血必相融。",            hint: "（提示：为了拆散他们，请让血相融！）",            difficulty: 1.0          },          {            id: 3,            title: "第三折：马下牛娃",            scene: "法场复审",            characters: [              { name: "周仁祥", role: "原告", icon: "🧔" },              { name: "牛娃", role: "被验者", icon: "👶" },              { name: "马氏", role: "母亲", icon: "👩‍🎤" }            ],            dialogue: [              { speaker: "周仁祥", text: "这牛娃是我亲生的，这还用验的啥呢！" },              { speaker: "晋信书", text: "周仁祥，你既有疑虑，本官便再让你心服口服。" },              { speaker: "晋信书", text: "真金不怕火炼，亲子不怕血验。再验一次便是！" }            ],            targetResult: false, // 目标：不融            bookLogic: "书云：真金不怕火炼，亲子不怕血验。",            hint: "（提示：让血分离，引出“马下牛娃”的笑话！）",            difficulty: 1.2          }        ];        const SanDiXueGame = () => {          const [gameState, setGameState] = useState('title');           const [currentLevel, setCurrentLevel] = useState(0);          const [bloodMerged, setBloodMerged] = useState(false);          const [dialogueStep, setDialogueStep] = useState(0);          const [displayedText, setDisplayedText] = useState("");           const [verdictResult, setVerdictResult] = useState(null);          const [isPlaying, setIsPlaying] = useState(false);          const [countdown, setCountdown] = useState(10);           const [dropCount, setDropCount] = useState(0); // 追踪血滴数量状态，用于UI更新                    const canvasRef = useRef(null);          const dropsRef = useRef([]);           const bowlRef = useRef({ angle: 0, speed: 0.015 }); // 降低默认速度          const audioRef = useRef(null);          // --- 音频初始化 ---          useEffect(() => {            audioRef.current = new Audio(MUSIC_URL);            audioRef.current.loop = true;            audioRef.current.volume = 0.5;            return () => { if (audioRef.current) audioRef.current.pause(); };          }, []);          const toggleMusic = () => {            if (audioRef.current) {              isPlaying ? audioRef.current.pause() : audioRef.current.play().catch(() => {});              setIsPlaying(!isPlaying);            }          };          const startGame = () => {            setCurrentLevel(0);            loadLevel(0);            if (!isPlaying && audioRef.current) {                audioRef.current.play().then(() => setIsPlaying(true)).catch(() => {});            }          };          const loadLevel = (index) => {            if (index >= SCRIPT_DATA.length) {              setGameState('ending');              return;            }            setGameState('story');            setDialogueStep(0);            setBloodMerged(false);            setVerdictResult(null);            setDropCount(0);            dropsRef.current = [];            bowlRef.current.angle = 0; // 重置角度          };          // --- 修复版打字机效果 ---          useEffect(() => {            if (gameState !== 'story') return;                        const level = SCRIPT_DATA[currentLevel];            const fullText = level.dialogue[dialogueStep].text;            let charIndex = 0;                        // 清空并立即设置第一个字，防止闪烁            setDisplayedText("");                         const timer = setInterval(() => {                charIndex++;                // 使用 slice 确保文字是确定的，不会重复追加                setDisplayedText(fullText.slice(0, charIndex));                if (charIndex >= fullText.length) {                    clearInterval(timer);                }            }, 50);            return () => clearInterval(timer);          }, [gameState, currentLevel, dialogueStep]);          const nextDialogue = () => {            const level = SCRIPT_DATA[currentLevel];            // 如果文字还没打完，直接显示全部            if (displayedText.length < level.dialogue[dialogueStep].text.length) {                setDisplayedText(level.dialogue[dialogueStep].text);                return;            }            // 否则进入下一句            if (dialogueStep < level.dialogue.length - 1) {              setDialogueStep(prev => prev + 1);            } else {              setGameState('game');            }          };          // --- 游戏逻辑 ---          const dropBlood = () => {            if (dropsRef.current.length >= 2 || bloodMerged) return;            const offsetX = (Math.random() - 0.5) * 60; // 减小随机范围，让血滴更容易落在中间            dropsRef.current.push({              x: 160 + offsetX,               y: 40,              vy: 0,              radius: 8,              settled: false,              phase: Math.random() * Math.PI            });            setDropCount(dropsRef.current.length); // 更新UI计数          };          const updatePhysics = useCallback((ctx, width, height) => {            const level = SCRIPT_DATA[currentLevel];            const centerX = width / 2;            const centerY = height / 2 + 40;                        // 碗的摇晃            bowlRef.current.angle += bowlRef.current.speed * level.difficulty;            const tilt = Math.sin(bowlRef.current.angle) * 10; // 减小晃动幅度 (12 -> 10)            ctx.clearRect(0, 0, width, height);            // 绘制碗            ctx.save();            ctx.translate(centerX, centerY);            ctx.rotate(tilt * 0.01);                        ctx.beginPath();            ctx.arc(0, 0, 90, 0, Math.PI);            ctx.fillStyle = '#f3f4f6';            ctx.fill();            ctx.lineWidth = 6;            ctx.strokeStyle = '#292524';             ctx.stroke();                        // 绘制水            ctx.beginPath();            ctx.moveTo(-85, 0);            ctx.bezierCurveTo(-40, tilt, 40, -tilt, 85, 0);            ctx.arc(0, 0, 85, 0, Math.PI);            ctx.fillStyle = bloodMerged ? '#fca5a5' : COLORS.water;             ctx.fill();            ctx.restore();            // 绘制血滴            const drops = dropsRef.current;            for (let i = 0; i < drops.length; i++) {                let d = drops[i];                if (!d.settled) {                    d.vy += 0.4;                    d.y += d.vy;                    // 落入水中                    if (d.y > centerY + Math.sin(d.x/50)*tilt) {                        d.settled = true;                        d.y = centerY;                        d.vy = 0;                    }                } else {                    // 水中漂浮                    // 减小水的推力，让它们更容易分离 (0.2 -> 0.15)                    d.x += tilt * 0.15;                    // 边界限制                    if (d.x > centerX + 60) d.x = centerX + 60;                    if (d.x < centerX - 60) d.x = centerX - 60;                    d.phase += 0.1;                    d.y = centerY + Math.sin(d.phase) * 2 + (d.x - centerX)/100 * tilt;                }                ctx.beginPath();                ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);                ctx.fillStyle = COLORS.blood;                ctx.fill();                ctx.strokeStyle = '#7f1d1d';                ctx.stroke();            }            // 融合逻辑            if (drops.length === 2 && !bloodMerged) {                const dx = drops[0].x - drops[1].x;                const dy = drops[0].y - drops[1].y;                const dist = Math.sqrt(dx*dx + dy*dy);                                // 减小融合判定距离，让“不融合”更容易 (25 -> 20)                if (dist < 20) {                     setBloodMerged(true);                    dropsRef.current = [{                        x: (drops[0].x + drops[1].x)/2,                        y: (drops[0].y + drops[1].y)/2,                        radius: 16,                         settled: true,                         phase: 0                    }];                }            }        }, [bloodMerged, currentLevel]);          useEffect(() => {            if (gameState === 'game') {                let animationFrameId;                const loop = () => {                    if (canvasRef.current) {                        const cvs = canvasRef.current;                        const ctx = cvs.getContext('2d');                        if (cvs.width !== 320 || cvs.height !== 320) {                            cvs.width = 320;                            cvs.height = 320;                        }                        updatePhysics(ctx, cvs.width, cvs.height);                    }                    animationFrameId = requestAnimationFrame(loop);                };                loop();                return () => cancelAnimationFrame(animationFrameId);            }          }, [gameState, updatePhysics]);          const handleVerdict = () => {            const level = SCRIPT_DATA[currentLevel];            const isScriptAccurate = (bloodMerged === level.targetResult);            setVerdictResult(isScriptAccurate);            setGameState('verdict');            if (!isScriptAccurate) {                setCountdown(10);             }          };          // --- 倒计时重试逻辑 ---          useEffect(() => {            let timer;            if (gameState === 'verdict' && verdictResult === false) {                if (countdown > 0) {                    timer = setTimeout(() => setCountdown(c => c - 1), 1000);                } else {                    retryLevel();                }            }            return () => clearTimeout(timer);          }, [gameState, verdictResult, countdown]);          // --- 强制重开功能 ---          const retryLevel = () => {            // 彻底重置所有状态            dropsRef.current = [];            bowlRef.current.angle = 0; // 重置物理            setBloodMerged(false);            setDropCount(0);            setCountdown(10); // 重置倒计时                        // 确保 gameState 切换能触发 useEffect 重新挂载            setGameState('temp');             setTimeout(() => setGameState('game'), 10);          };          const confirmVerdict = () => {             const next = currentLevel + 1;             setCurrentLevel(next);             loadLevel(next);          };          // --- 界面渲染 ---          const renderTitle = () => (            <div className="flex flex-col items-center justify-center h-full bg-amber-50 p-8 text-center relative overflow-hidden">              <div className="border-y-4 border-red-900 py-8 w-full max-w-sm">                <h1 className="text-5xl font-ink text-red-900 mb-2">秦腔 · 三滴血</h1>                <p className="text-xl font-serif text-stone-600 tracking-[0.5em] mt-4">糊涂断案</p>              </div>              <p className="mt-8 text-stone-700 font-serif leading-loose">                既然是<b>晋信书</b>，<br/>那就请把书上的死理贯彻到底！              </p>              <button onClick={startGame} className="mt-8 px-10 py-3 bg-red-900 text-amber-50 rounded-lg text-xl font-bold hover:bg-red-800 shadow-xl flex items-center gap-2 transform transition hover:scale-105">                <Gavel size={24} /> 升堂              </button>            </div>          );          const renderStory = () => {            const level = SCRIPT_DATA[currentLevel];            const dialogue = level.dialogue[dialogueStep];            return (              <div className="flex flex-col h-full bg-stone-200">                <div className="bg-red-900 text-amber-50 p-3 shadow-lg flex justify-between items-center z-10">                    <span className="font-ink text-xl">{level.title}</span>                    <span className="text-xs opacity-70 border border-white/30 px-2 rounded">第 {currentLevel + 1} 场</span>                </div>                <div className="flex-1 relative flex flex-col justify-end pb-8 overflow-hidden paper-texture">                    {/* 角色舞台 */}                    <div className="absolute top-10 w-full flex justify-center gap-6 px-4">                        {level.characters.map((char, idx) => (                            <div key={idx} className={`flex flex-col items-center transition-all duration-300 ${dialogue.speaker === char.name ? 'scale-110 opacity-100 -translate-y-2' : 'scale-90 opacity-50 grayscale'}`}>                                <div className="w-20 h-20 rounded-full bg-stone-100 border-4 border-stone-800 flex items-center justify-center text-4xl shadow-lg relative">                                    {char.icon}                                </div>                                <span className="bg-stone-800 text-amber-50 px-2 py-0.5 text-xs rounded mt-2 font-bold shadow">{char.name}</span>                            </div>                        ))}                    </div>                    {/* 晋信书 */}                    <div className={`absolute bottom-40 right-4 flex flex-col items-end transition-all duration-300 ${dialogue.speaker === '晋信书' ? 'opacity-100 scale-105' : 'opacity-80 scale-95'}`}>                        <div className="w-24 h-24 bg-red-100 border-4 border-red-900 rounded-lg flex items-center justify-center text-5xl shadow-xl z-10 rotate-3">                            👺                        </div>                        <span className="bg-red-900 text-white px-3 py-1 text-sm font-bold rounded mt-[-10px] z-20 mr-2 shadow-lg">晋信书</span>                    </div>                    {/* 对话框 */}                    <div className="mx-4 mb-4 bg-white border-2 border-stone-800 p-5 rounded-lg shadow-[5px_5px_0px_rgba(41,37,36,1)] relative min-h-[140px] cursor-pointer" onClick={nextDialogue}>                        <div className="absolute -top-3 left-4 bg-red-700 text-amber-50 px-3 py-1 text-sm font-bold rounded shadow-md">                            {dialogue.speaker}                        </div>                        <p className="text-lg font-serif text-stone-900 leading-relaxed mt-3 font-bold">                            {displayedText}                            <span className="animate-pulse">_</span>                        </p>                        <div className="absolute bottom-2 right-4 text-stone-400 text-xs flex items-center gap-1">                            {displayedText.length < dialogue.text.length ? "点击加速" : "点击继续"} <ArrowRight size={12}/>                        </div>                    </div>                </div>              </div>            );          };          const renderGame = () => {            const level = SCRIPT_DATA[currentLevel];            return (              <div className="flex flex-col h-full bg-stone-300 relative">                {/* 安全重置按钮 (防止卡死) */}                <button                     onClick={retryLevel}                    className="absolute top-2 right-2 z-20 p-2 text-stone-500 hover:text-stone-800 bg-white/50 rounded-full"                    title="卡死重置"                >                    <RefreshCw size={16}/>                </button>                {/* 顶部提示 */}                <div className="absolute top-4 w-full px-4 z-10 pointer-events-none">                    <div className="bg-amber-50 border-l-4 border-red-600 p-4 shadow-lg rounded pointer-events-auto">                        <p className="text-xs font-bold text-red-900 mb-1 flex items-center gap-2">                            <BookOpen size={14}/> 晋大老爷的死理：                        </p>                        <p className="text-lg font-ink text-stone-900">{level.bookLogic}</p>                        <p className="text-xs text-red-600 mt-1 font-bold">{level.hint}</p>                    </div>                </div>                <div className="flex-1 flex items-center justify-center relative bg-stone-200">                    <canvas ref={canvasRef} width={320} height={320} className="touch-none bg-transparent" style={{maxWidth: '100%'}} />                </div>                {/* 操作区 */}                <div className="h-1/3 bg-stone-800 p-6 flex flex-col items-center justify-center gap-4 shadow-[0_-10px_40px_rgba(0,0,0,0.3)] z-20 rounded-t-3xl">                    <div className="text-amber-50 font-serif text-base text-center h-6 animate-pulse">                        {dropCount === 0 ? "点击滴入第一滴血" :                          dropCount === 1 ? "寻找时机滴入第二滴血" :                          bloodMerged ? <span className="text-red-400 font-bold text-xl">血液已融合！</span> :                          <span className="text-blue-300 font-bold">血液分离中... (符合死理?)</span>}                    </div>                    <div className="flex gap-8 items-center w-full justify-center">                        <button                             onClick={dropBlood}                            disabled={dropCount >= 2 || bloodMerged}                            className={`w-20 h-20 rounded-full border-4 flex items-center justify-center transition-all transform active:scale-95 ${                                dropCount >= 2                                 ? 'bg-stone-600 border-stone-500 opacity-50 cursor-not-allowed'                                 : 'bg-red-700 border-red-500 hover:bg-red-600 shadow-[0_0_20px_rgba(220,38,38,0.6)]'                            }`}                        >                            <Droplets size={32} className="text-white" />                        </button>                                                {dropCount >= 2 && (                            <button                                 onClick={handleVerdict}                                className="px-6 py-4 bg-amber-500 text-stone-900 font-bold rounded-lg shadow-lg hover:bg-amber-400 animate-bounce flex items-center gap-2"                            >                                <Gavel size={20}/> 立即宣判                            </button>                        )}                    </div>                </div>              </div>            );          };          const renderVerdict = () => {            const success = verdictResult;            return (                <div className={`flex flex-col h-full p-8 items-center justify-center text-center transition-colors duration-500 ${success ? 'bg-red-900' : 'bg-stone-800'}`}>                    <div className="relative mb-8">                        <div className={`w-40 h-40 border-8 rounded-full flex items-center justify-center text-6xl font-ink animate-stamp ${success ? 'border-amber-400 text-amber-400' : 'border-stone-500 text-stone-500'}`}>                            {success ? "神判" : "误判"}                        </div>                    </div>                                        <h2 className="text-2xl font-serif font-bold text-amber-50 mb-4">                        {bloodMerged ? "血液相融！" : "血液未融！"}                    </h2>                    <div className="bg-black/20 p-6 rounded-lg border border-white/10 mb-8 max-w-sm w-full backdrop-blur-sm">                        <p className="text-lg font-serif leading-relaxed text-white">                            {success                                 ? (currentLevel === 2                                     ? "“你先别急，你妻马氏，你子牛娃，马下牛娃也是世上常有！”"                                     : "“此乃天意！正如书中所云，本官判决英明！”")                                 : "“哎呀... 这结果和书上说的不一样！这让本官的脸往哪搁？”"                            }                        </p>                    </div>                    {success ? (                        <div className="animate-in fade-in slide-in-from-bottom duration-700">                            <button onClick={confirmVerdict} className="px-8 py-3 bg-amber-500 text-red-900 font-bold rounded-full hover:bg-amber-400 flex items-center gap-2 mx-auto shadow-lg hover:shadow-amber-500/50">                                下一折 <ArrowRight size={20}/>                            </button>                        </div>                    ) : (                        <div className="w-full">                            <p className="text-red-400 font-bold text-xl mb-2 animate-pulse">判决与剧情不符！</p>                            <div className="text-6xl font-mono text-white mb-2 font-bold">{countdown}</div>                            <p className="text-sm text-stone-400 mb-6">秒后自动重审...</p>                                                        <button onClick={retryLevel} className="px-6 py-2 bg-stone-700 text-white font-bold rounded-full hover:bg-stone-600 flex items-center gap-2 mx-auto border border-stone-500 text-sm">                                <RotateCcw size={14}/> 立即重试                            </button>                        </div>                    )}                </div>            );          };          const renderEnding = () => (            <div className="flex flex-col items-center justify-center h-full p-8 bg-stone-900 text-stone-300 text-center">                <div className="w-24 h-24 bg-stone-800 rounded-full flex items-center justify-center mb-6 border-4 border-amber-600 shadow-[0_0_30px_rgba(217,119,6,0.3)]">                    <span className="text-5xl">🎭</span>                </div>                <h2 className="text-4xl font-ink text-amber-500 mb-6">全剧终</h2>                <div className="text-lg leading-loose max-w-md font-serif text-stone-400 space-y-4">                    <p>您成功扮演了糊涂县官晋信书。</p>                    <p>通过三次荒谬的滴血认亲，<br/>制造了“骨肉分离、棒打鸳鸯、马下牛娃”<br/>的三大奇案。</p>                    <div className="border-t border-stone-700 w-1/2 mx-auto my-4"></div>                    <p className="text-amber-100 italic text-xl">“尽信书，则不如无书。”</p>                </div>                <button onClick={startGame} className="mt-10 px-8 py-3 border-2 border-amber-700 text-amber-600 hover:bg-amber-900/20 hover:text-amber-500 transition-all rounded font-bold">                    重演此剧                </button>            </div>          );          return (            <div className="w-full h-screen bg-neutral-900 flex items-center justify-center font-sans overflow-hidden select-none">                <div className="w-full max-w-md h-[800px] max-h-screen bg-stone-50 shadow-2xl relative overflow-hidden flex flex-col border-x-8 border-stone-800">                    <button                         onClick={toggleMusic}                         className="absolute top-4 right-4 z-50 p-2 bg-black/50 rounded-full text-white hover:bg-black/70 backdrop-blur"                    >                        {isPlaying ? <Volume2 size={16}/> : <VolumeX size={16}/>}                    </button>                    {gameState === 'title' && renderTitle()}                    {gameState === 'story' && renderStory()}                    {gameState === 'game' && renderGame()}                    {gameState === 'verdict' && renderVerdict()}                    {gameState === 'ending' && renderEnding()}                </div>            </div>          );        };        const root = ReactDOM.createRoot(document.getElementById('root'));        root.render(<SanDiXueGame />);    </script></body></html>
